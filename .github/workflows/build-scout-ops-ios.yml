name: Build Scout-Ops Mobile App (iOS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.3.0)"
        required: true
      release_notes:
        description: "What's new in this release"
        required: false
        default: "Bug fixes and performance improvements."
      codesign:
        description: "Sign the IPAs (requires Apple certs in secrets)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-ios:
    name: Build Scout-Ops Mobile App (iOS with built-in modules)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Bump version
        run: |
          V="${{ inputs.version }}+${{ github.run_number }}"
          sed -i '' "s/^version: .*/version: $V/" scouting/android/pubspec.yaml

      - name: Import Apple Distribution Certificate
        if: inputs.codesign == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DIST_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > dist_cert.p12
          security import dist_cert.p12 \
            -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profiles
        if: inputs.codesign == 'true'
        env:
          PP_ANDROID: ${{ secrets.APPLE_PP_ANDROID_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PP_ANDROID" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/scout_ops_mobile.mobileprovision

      # flutter pub get on macOS generates the Podfile and runs pod install automatically.
      # flutter build ipa then handles the full CocoaPods + Xcode build chain.

      - name: Build IPA — Scout-Ops Mobile App
        working-directory: scouting/android
        run: |
          flutter pub get
          if [ "${{ inputs.codesign }}" = "true" ]; then
            flutter build ipa --no-tree-shake-icons
          else
            flutter build ipa --no-codesign --no-tree-shake-icons
          fi

      - name: Collect artifacts
        run: |
          V="${{ inputs.version }}"
          SIGNED="${{ inputs.codesign }}"

          IPA=$(find "scouting/android/build/ios/iphoneos" -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            if [ "$SIGNED" = "true" ]; then
              cp "$IPA" "scout_ops_mobile_${V}.ipa"
              echo "✅ Scout-Ops Mobile: scout_ops_mobile_${V}.ipa (signed)"
            else
              cp "$IPA" "scout_ops_mobile_${V}_unsigned.ipa"
              echo "✅ Scout-Ops Mobile: scout_ops_mobile_${V}_unsigned.ipa (unsigned)"
            fi
          else
            echo "❌ No IPA found — build may have failed"
            exit 1
          fi

          echo "Artifact collected."
          ls -lh scout_ops_*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scout-ops-mobile-ios-${{ inputs.version }}
          path: |
            scout_ops_mobile_${{ inputs.version }}*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ inputs.version }}"
          SIGNED="${{ inputs.codesign }}"
          NOTES="${{ inputs.release_notes }}"

          if [ "$SIGNED" = "true" ]; then
            SIGN_NOTE="✅ **Signed** — distribute via TestFlight or AltStore"
            INSTALL_NOTE="Upload to TestFlight via Transporter, or install directly with Apple Configurator 2."
            FILE="scout_ops_mobile_${V}.ipa"
          else
            SIGN_NOTE="⚠️ **Unsigned** — requires local signing before device install"
            INSTALL_NOTE="Use AltStore to sideload, or open in Xcode Organizer to sign and export."
            FILE="scout_ops_mobile_${V}_unsigned.ipa"
          fi

          cat > release_notes.md <<EOF
          ## 🍎 Scout-Ops Mobile App v${V} (iOS)

          **One download. All scouting modules included.**

          ${SIGN_NOTE}

          ${NOTES}

          ### Built-in Modules
          - Match Scouting Module
          - Pit Scouting Module  
          - QR Code Scanner Module

          ### File
          | File | Description |
          |-----|-------------|
          | \`${FILE}\` | Scout-Ops Mobile App for iOS |

          ### Installing on Device
          ${INSTALL_NOTE}

          **Built from:** \`${{ github.sha }}\`
          **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh release create "mobile-ios-v${V}" \
            "$FILE" \
            --title "Scout-Ops Mobile App v${V} (iOS)" \
            --notes-file release_notes.md \
            --prerelease=$([ "$SIGNED" = "false" ] && echo "true" || echo "false")

name: Build Scout-Ops Mobile App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.3.0)"
        required: true
      release_notes:
        description: "What's new in this release"
        required: false
        default: "Bug fixes and performance improvements."
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build-android:
    name: Build Scout-Ops Mobile App (with built-in modules)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 4. Bump version ───────────────────────────────────────────────────────
      - name: Bump version
        run: |
          V="${{ inputs.version }}+${{ github.run_number }}"
          sed -i "s/^version: .*/version: $V/" scouting/android/pubspec.yaml

      # ── 5. Keystore setup (release only) ──────────────────────────────────────
      - name: Decode keystore
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"        >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"              >> android/key.properties
          echo "storeFile=keystore.jks"                         >> android/key.properties

      # ── 5. Build: Scout-Ops Mobile App (with built-in modules) ───────────────────────
      - name: Build Scout-Ops Mobile App
        working-directory: scouting/android
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      - name: Build Scout-Ops Mobile App Bundle
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: flutter build appbundle --no-tree-shake-icons

      # ── 6. Collect & rename APK ─────────────────────────────────────────
      - name: Collect artifacts
        run: |
          V="${{ inputs.version }}"
          T="${{ inputs.build_type }}"
          cp "scouting/android/build/app/outputs/flutter-apk/app-${T}.apk" "scout_ops_mobile_${V}.apk"
          if [ "$T" = "release" ]; then
            cp "scouting/android/build/app/outputs/bundle/release/app-release.aab" "scout_ops_mobile_${V}.aab"
          fi

      # ── 7. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scout-ops-mobile-${{ inputs.version }}-${{ inputs.build_type }}
          path: |
            scout_ops_mobile_${{ inputs.version }}.apk
            scout_ops_mobile_${{ inputs.version }}.aab
          if-no-files-found: ignore
          retention-days: 30

      # ── 8. GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ inputs.version }}"
          T="${{ inputs.build_type }}"
          NOTES="${{ inputs.release_notes }}"

          FILES="scout_ops_mobile_${V}.apk"
          if [ "$T" = "release" ] && [ -f "scout_ops_mobile_${V}.aab" ]; then
            FILES="$FILES scout_ops_mobile_${V}.aab"
          fi

          cat > release_notes.md <<EOF
          ## 🤖 Scout-Ops Mobile App v${V} (${T})

          **One download. All scouting modules included.**

          ${NOTES}

          ### Built-in Modules
          - Match Scouting Module
          - Pit Scouting Module  
          - QR Code Scanner Module

          ### Files
          | File | Description |
          |-----|-------------|
          | \`scout_ops_mobile_${V}.apk\` | Android APK (install directly) |
          $([ "$T" = "release" ] && echo "| \`scout_ops_mobile_${V}.aab\` | Android App Bundle (Play Store) |")

          **Built from:** \`${{ github.sha }}\`
          **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh release create "mobile-v${V}" \
            $FILES \
            --title "Scout-Ops Mobile App v${V}" \
            --notes-file release_notes.md \
            --prerelease=$([ "$T" = "debug" ] && echo "true" || echo "false")

name: Build Scout Ops Android (All Apps)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.3.0)"
        required: true
      release_notes:
        description: "What's new in this release"
        required: false
        default: "Bug fixes and performance improvements."
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build-android:
    name: Build & Release All Android APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 4. Bump version in all pubspecs ───────────────────────────────────────
      - name: Bump versions
        run: |
          V="${{ inputs.version }}+${{ github.run_number }}"
          sed -i "s/^version: .*/version: $V/" scouting/android/pubspec.yaml
          sed -i "s/^version: .*/version: $V/" scouting/scan/pubspec.yaml
          sed -i "s/^version: .*/version: $V/" scouting/dash/pubspec.yaml
          sed -i "s/^version: .*/version: $V/" scouting/match-viewer/pubspec.yaml

      # ── 5. Keystore setup (release only) ──────────────────────────────────────
      - name: Decode keystore
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"        >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"              >> android/key.properties
          echo "storeFile=keystore.jks"                         >> android/key.properties

      # ── 6. Build: Scout Ops Android (main scouting app) ───────────────────────
      - name: Build Scout Ops Android
        working-directory: scouting/android
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      - name: Build Scout Ops Android App Bundle
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: flutter build appbundle --no-tree-shake-icons

      # ── 7. Build: Scout Ops Scan ──────────────────────────────────────────────
      - name: Build Scout Ops Scan
        working-directory: scouting/scan
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      # ── 8. Build: Scout Ops Dash ──────────────────────────────────────────────
      - name: Build Scout Ops Dash
        working-directory: scouting/dash
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      # ── 9. Build: Scout Ops Match Viewer ──────────────────────────────────────
      - name: Build Scout Ops Match Viewer
        working-directory: scouting/match-viewer
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      # ── 10. Collect & rename all APKs ─────────────────────────────────────────
      - name: Collect artifacts
        run: |
          V="${{ inputs.version }}"
          T="${{ inputs.build_type }}"
          cp "scouting/android/build/app/outputs/flutter-apk/app-${T}.apk"      "scout_ops_android_${V}.apk"
          cp "scouting/scan/build/app/outputs/flutter-apk/app-${T}.apk"         "scout_ops_scan_${V}.apk"
          cp "scouting/dash/build/app/outputs/flutter-apk/app-${T}.apk"         "scout_ops_dash_${V}.apk"
          cp "scouting/match-viewer/build/app/outputs/flutter-apk/app-${T}.apk" "scout_ops_match_viewer_${V}.apk"
          if [ "$T" = "release" ]; then
            cp "scouting/android/build/app/outputs/bundle/release/app-release.aab" "scout_ops_android_${V}.aab"
          fi

      # ── 11. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scout-ops-android-all-${{ inputs.version }}-${{ inputs.build_type }}
          path: |
            scout_ops_android_${{ inputs.version }}.apk
            scout_ops_scan_${{ inputs.version }}.apk
            scout_ops_dash_${{ inputs.version }}.apk
            scout_ops_match_viewer_${{ inputs.version }}.apk
            scout_ops_android_${{ inputs.version }}.aab
          if-no-files-found: ignore
          retention-days: 30

      # ── 12. GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ inputs.version }}"
          T="${{ inputs.build_type }}"
          NOTES="${{ inputs.release_notes }}"

          FILES="scout_ops_android_${V}.apk scout_ops_scan_${V}.apk scout_ops_dash_${V}.apk scout_ops_match_viewer_${V}.apk"
          if [ "$T" = "release" ] && [ -f "scout_ops_android_${V}.aab" ]; then
            FILES="$FILES scout_ops_android_${V}.aab"
          fi

          cat > release_notes.md <<EOF
          ## 🤖 Scout Ops Suite — Android v${V} (${T})

          ${NOTES}

          ### Included Apps
          | App | File |
          |-----|------|
          | Scout Ops Android | \`scout_ops_android_${V}.apk\` |
          | Scout Ops Scan    | \`scout_ops_scan_${V}.apk\` |
          | Scout Ops Dash    | \`scout_ops_dash_${V}.apk\` |
          | Match Viewer      | \`scout_ops_match_viewer_${V}.apk\` |
          $([ "$T" = "release" ] && echo "| Android App Bundle | \`scout_ops_android_${V}.aab\` |")

          **Built from:** \`${{ github.sha }}\`
          **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh release create "android-v${V}" \
            $FILES \
            --title "Scout Ops Suite — Android v${V}" \
            --notes-file release_notes.md \
            --prerelease=$([ "$T" = "debug" ] && echo "true" || echo "false")

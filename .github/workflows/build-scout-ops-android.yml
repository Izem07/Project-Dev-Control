name: Build Scout Ops Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.0)"
        required: true
      release_notes:
        description: "What's new in this release"
        required: false
        default: "Bug fixes and performance improvements."
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build-android:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── 4. Bump version in pubspec ────────────────────────────────────────────
      - name: Bump version
        working-directory: scouting/android
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml

      # ── 5. Keystore setup (release only) ──────────────────────────────────────
      - name: Decode keystore
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"        >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"              >> android/key.properties
          echo "storeFile=keystore.jks"                         >> android/key.properties

      # ── 6. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: scouting/android
        run: flutter pub get

      # ── 7. Build APK ─────────────────────────────────────────────────────────
      - name: Build APK (${{ inputs.build_type }})
        working-directory: scouting/android
        run: flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      # ── 8. Build App Bundle (release only) ────────────────────────────────────
      - name: Build App Bundle
        if: inputs.build_type == 'release'
        working-directory: scouting/android
        run: flutter build appbundle --no-tree-shake-icons

      # ── 9. Rename artifacts ───────────────────────────────────────────────────
      - name: Rename artifacts
        run: |
          VERSION="${{ inputs.version }}"
          TYPE="${{ inputs.build_type }}"
          cp "scouting/android/build/app/outputs/flutter-apk/app-${TYPE}.apk" \
             "scout_ops_android_${VERSION}.apk"
          if [ "$TYPE" = "release" ]; then
            cp "scouting/android/build/app/outputs/bundle/release/app-release.aab" \
               "scout_ops_android_${VERSION}.aab"
          fi

      # ── 10. Upload build artifacts ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-ops-android-${{ inputs.version }}-${{ inputs.build_type }}
          path: |
            scout_ops_android_${{ inputs.version }}.apk
            scout_ops_android_${{ inputs.version }}.aab
          if-no-files-found: ignore
          retention-days: 30

      # ── 11. GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          TYPE="${{ inputs.build_type }}"
          NOTES="${{ inputs.release_notes }}"

          # Build file list — AAB only exists for release builds
          FILES="scout_ops_android_${VERSION}.apk"
          if [ "$TYPE" = "release" ] && [ -f "scout_ops_android_${VERSION}.aab" ]; then
            FILES="$FILES scout_ops_android_${VERSION}.aab"
          fi

          cat > release_notes.md <<EOF
          ## 🤖 Scout Ops Android — v${VERSION} (${TYPE})

          ${NOTES}

          ### Artifacts
          - \`scout_ops_android_${VERSION}.apk\` — Install directly on Android tablets
          $([ "$TYPE" = "release" ] && echo "- \`scout_ops_android_${VERSION}.aab\` — Google Play App Bundle")

          **Built from:** \`${{ github.sha }}\`
          **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh release create "android-v${VERSION}" \
            $FILES \
            --title "Scout Ops Android v${VERSION}" \
            --notes-file release_notes.md \
            --prerelease=$([ "$TYPE" = "debug" ] && echo "true" || echo "false")
